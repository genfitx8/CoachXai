<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Swingnote - 스윙노트 | 골프 레슨 노트</title>
    <meta name="description" content="골프 레슨 기록과 예약을 한 곳에서 관리하세요. 코치와 회원을 위한 스윙노트 앱입니다." />

    <!-- PWA Manifest (used by the web/PWA build; ignored by native Capacitor builds) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (Android Chrome, Edge) -->
    <meta name="theme-color" content="#10b981" />

    <!-- iOS Safari PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="스윙노트" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />

    <!-- Disable phone number auto-detection (iOS WebView) -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Prevent content shifting when the keyboard appears (Capacitor / iOS) -->
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
