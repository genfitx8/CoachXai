services:
  - type: web
    name: coachxai-server
    env: node
    rootDir: server
    buildCommand: npm install --production=false && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: coachxai-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: APP_ALLOWED_ORIGINS
        sync: false
      - key: PAYAPP_SECRET_KEY
        sync: false
      - key: PAYAPP_API_BASE
        sync: false
      - key: PAYAPP_CHECKOUT_URL
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false

databases:
  - name: coachxai-db
    databaseName: coachxai
    user: coachxai
    plan: basic-256mb
